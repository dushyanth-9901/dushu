<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }
    header {
      background: #007bff;
      color: #fff;
      padding: 15px;
      text-align: center;
    }
    nav {
      width: 200px;
      background: #343a40;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      padding-top: 20px;
    }
    nav a {
      display: block;
      color: #fff;
      padding: 10px 20px;
      text-decoration: none;
    }
    nav a:hover {
      background: #495057;
    }
    main {
      margin-left: 200px;
      padding: 20px;
    }
    .card {
      background: #fff;
      padding: 20px;
      margin: 10px;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      display: inline-block;
      width: 200px;
      text-align: center;
    }
    footer {
      background: #007bff;
      color: #fff;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      left: 200px;
      right: 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>My Dashboard</h1>
  </header>

  <nav>
    <a href="#">Dashboard</a>
    <a href="#">Reports</a>
    <a href="#">Settings</a>
    <a href="#">Logout</a>
  </nav>

  <main>
    <h2>Overview</h2>
    <div class="card">
      <h3>Total Sales</h3>
      <p>$12,340</p>
    </div>
    <div class="card">
      <h3>Users</h3>
      <p>1,245</p>
    </div>
    <div class="card">
      <h3>Orders</h3>
      <p>320</p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 My Dashboard</p>
  </footer>
</body>
</html>
